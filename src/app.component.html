<div class="min-h-screen flex flex-col font-sans text-slate-900 dark:text-slate-100 bg-slate-50 dark:bg-slate-950 transition-colors duration-300">
  
  <!-- Header -->
  <header class="sticky top-0 z-30 w-full backdrop-blur-md bg-white/70 dark:bg-slate-900/70 border-b border-slate-200 dark:border-slate-800 transition-colors duration-300">
    <div class="max-w-[1920px] mx-auto px-4 sm:px-6 lg:px-8 h-18 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="relative bg-blue-600 dark:bg-blue-500 text-white p-2.5 rounded-xl shadow-lg shadow-blue-500/20 dark:shadow-blue-500/10">
          <div class="absolute inset-0 rounded-xl bg-white/20 blur opacity-50"></div>
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="relative w-6 h-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3v11.25A2.25 2.25 0 0 0 6 16.5h2.25M3.75 3h-1.5m1.5 0h16.5m0 0h1.5m-1.5 0v11.25A2.25 2.25 0 0 1 18 16.5h-2.25m-7.5 0h7.5m-7.5 0-1 3m8.5-3 1 3m0 0 .5 1.5m-.5-1.5h-9.5m0 0-.5 1.5M9 11.25v1.5M12 9v3.75m3-6v6" />
          </svg>
        </div>
        <div>
          <h1 class="text-lg font-bold tracking-tight text-slate-900 dark:text-white leading-none">Industrial<span class="text-blue-600 dark:text-blue-400">Hub</span></h1>
          <p class="text-xs text-slate-500 dark:text-slate-400 font-medium">Real-time Plant Analytics</p>
        </div>
      </div>
      
      <div class="flex items-center gap-4">
        <!-- Status Indicator -->
        <div class="hidden md:flex items-center gap-2 px-3 py-1.5 rounded-full bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700">
          <span class="relative flex h-2.5 w-2.5">
            <span *ngIf="isStreaming()" class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-2.5 w-2.5" [class.bg-green-500]="isStreaming()" [class.bg-slate-400]="!isStreaming()"></span>
          </span>
          <span class="text-xs font-semibold uppercase tracking-wide text-slate-600 dark:text-slate-300 min-w-[60px] text-center">
            {{ isStreaming() ? 'Live' : 'Paused' }}
          </span>
        </div>

        <!-- Theme Toggle -->
        <button 
          (click)="themeService.toggle()"
          class="p-2.5 rounded-xl bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-slate-400 dark:focus:ring-slate-600"
          aria-label="Toggle Dark Mode">
          @if (themeService.isDarkMode()) {
            <!-- Sun Icon -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
            </svg>
          } @else {
            <!-- Moon Icon -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
            </svg>
          }
        </button>

        <!-- Stream Toggle -->
        <button 
          (click)="toggleStream()"
          class="inline-flex items-center px-5 py-2.5 text-sm font-semibold rounded-xl focus:outline-none focus:ring-2 focus:ring-offset-2 dark:focus:ring-offset-slate-900 transition-all duration-200 shadow-lg"
          [class.shadow-red-500/20]="isStreaming()"
          [class.shadow-blue-500/20]="!isStreaming()"
          [class.bg-red-500]="isStreaming()"
          [class.hover:bg-red-600]="isStreaming()"
          [class.text-white]="isStreaming()"
          [class.focus:ring-red-500]="isStreaming()"
          [class.bg-blue-600]="!isStreaming()"
          [class.hover:bg-blue-700]="!isStreaming()"
          [class.text-white]="!isStreaming()"
          [class.focus:ring-blue-500]="!isStreaming()"
        >
          @if (isStreaming()) {
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4 mr-2">
              <path d="M5.75 3a.75.75 0 0 0-.75.75v12.5c0 .414.336.75.75.75h1.5a.75.75 0 0 0 .75-.75V3.75A.75.75 0 0 0 7.25 3h-1.5ZM12.75 3a.75.75 0 0 0-.75.75v12.5c0 .414.336.75.75.75h1.5a.75.75 0 0 0 .75-.75V3.75a.75.75 0 0 0-.75-.75h-1.5Z" />
            </svg>
            Stop
          } @else {
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4 mr-2">
              <path d="M6.3 2.84A1.5 1.5 0 0 0 4 4.11v11.78a1.5 1.5 0 0 0 2.3 1.27l9.344-5.891a1.5 1.5 0 0 0 0-2.538L6.3 2.841Z" />
            </svg>
            Start
          }
        </button>
      </div>
    </div>
  </header>

  <!-- Main Grid -->
  <main class="flex-1 w-full max-w-[1920px] mx-auto px-4 sm:px-6 lg:px-8 py-8">
    
    <!-- KPI Summary Row (Cosmetic Example) -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
       <div class="bg-white dark:bg-slate-900 p-4 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm flex items-center justify-between">
          <div>
             <p class="text-xs text-slate-500 dark:text-slate-400 uppercase font-bold">Total Uptime</p>
             <p class="text-2xl font-bold text-slate-800 dark:text-white">99.9%</p>
          </div>
          <div class="p-2 bg-green-100 dark:bg-green-500/20 text-green-600 dark:text-green-400 rounded-lg">
             <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>
          </div>
       </div>
       <div class="bg-white dark:bg-slate-900 p-4 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm flex items-center justify-between">
          <div>
             <p class="text-xs text-slate-500 dark:text-slate-400 uppercase font-bold">Alerts</p>
             <p class="text-2xl font-bold text-slate-800 dark:text-white">0</p>
          </div>
          <div class="p-2 bg-blue-100 dark:bg-blue-500/20 text-blue-600 dark:text-blue-400 rounded-lg">
             <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" /></svg>
          </div>
       </div>
       <div class="bg-white dark:bg-slate-900 p-4 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm flex items-center justify-between">
          <div>
             <p class="text-xs text-slate-500 dark:text-slate-400 uppercase font-bold">Efficiency</p>
             <p class="text-2xl font-bold text-slate-800 dark:text-white">87%</p>
          </div>
          <div class="p-2 bg-purple-100 dark:bg-purple-500/20 text-purple-600 dark:text-purple-400 rounded-lg">
             <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
          </div>
       </div>
       <div class="bg-white dark:bg-slate-900 p-4 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm flex items-center justify-between">
          <div>
             <p class="text-xs text-slate-500 dark:text-slate-400 uppercase font-bold">Network</p>
             <p class="text-2xl font-bold text-slate-800 dark:text-white">1.2GB/s</p>
          </div>
          <div class="p-2 bg-orange-100 dark:bg-orange-500/20 text-orange-600 dark:text-orange-400 rounded-lg">
             <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
          </div>
       </div>
    </div>

    <!-- Charts Grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-4 sm:gap-6">
      @for (chart of charts(); track chart.id) {
        <div class="h-64 sm:h-72"> <!-- Increased height slightly for better spacing -->
          <app-chart-card
            [chartId]="chart.id"
            [title]="chart.title"
            [type]="chart.type"
            [data]="chart.data"
            [labels]="chart.labels"
            [color]="chart.color"
          ></app-chart-card>
        </div>
      }
    </div>
  </main>
  
  <footer class="bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 py-8 mt-4 transition-colors duration-300">
    <div class="max-w-7xl mx-auto px-4 text-center">
      <p class="text-sm text-slate-400 dark:text-slate-500">© 2024 IndustrialHub Analytics • Powered by Angular Signals & Chart.js</p>
    </div>
  </footer>
</div>
